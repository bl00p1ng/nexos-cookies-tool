name: Release

on:
  # Dispara automáticamente al pushear un tag tipo v1.4.2
  push:
    tags:
      - 'v*.*.*'

  # Permite disparar manualmente desde la pestaña Actions
  # (útil para probar el pipeline sin crear release)
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publicar a GitHub Releases'
        required: false
        type: boolean
        default: false

# Necesario para que electron-builder pueda crear/actualizar GitHub Releases
# vía la API usando el GITHUB_TOKEN automático.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest es arm64. dmg-license declara cpu: ['x64'] y npm
          # lo omite en arm64; el step "Force-install dmg-license" más abajo
          # lo instala manualmente bypassing la restricción (la herramienta
          # es Node puro, no tiene código nativo, funciona en cualquier cpu).
          - os: macos-latest
            name: macOS
            build_cmd: build-mac
          - os: windows-latest
            name: Windows
            build_cmd: build-win

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # dmg-license@1.0.11 declara cpu: ['x64'] en su package.json. La
      # herramienta es Node puro (genera el SLA del .dmg, sin binario nativo)
      # y funciona en arm64 sin problema, pero npm respeta esa metadata
      # incorrecta y omite el paquete en runners arm64.
      #
      # Workaround quirúrgico: extraemos el tarball directamente en su
      # carpeta de node_modules e instalamos sus deps DENTRO de su propio
      # node_modules anidado. Node module resolution encuentra esas deps
      # nested antes de subir al árbol del proyecto, así que esto no toca
      # ni una sola línea del node_modules raíz (que ya está consistente
      # con package-lock.json tras npm ci).
      - name: Install dmg-license isolated (macOS arm64 workaround)
        if: runner.os == 'macOS'
        run: |
          set -e
          TARBALL=$(npm view dmg-license@^1.0.11 dist.tarball)
          echo "Fetching $TARBALL"
          rm -rf node_modules/dmg-license
          mkdir -p node_modules/dmg-license
          curl -sSL "$TARBALL" | tar -xz --strip-components=1 -C node_modules/dmg-license

          # Quitamos la restricción de cpu del package.json para evitar
          # cualquier check posterior. El paquete es Node puro.
          node -e "const f='node_modules/dmg-license/package.json'; const fs=require('fs'); const p=JSON.parse(fs.readFileSync(f,'utf8')); delete p.cpu; delete p.os; fs.writeFileSync(f, JSON.stringify(p,null,2))"

          # Instalamos sus dependencias runtime DENTRO de su propio
          # node_modules anidado. Esto no reconcilia el árbol raíz.
          # --ignore-scripts evita que se ejecute "prepare": "tsc" (rebuild
          # innecesario, el tarball publicado ya trae los .js compilados).
          (cd node_modules/dmg-license && npm install --no-save --no-package-lock --omit=dev --omit=peer --ignore-scripts)

          test -f node_modules/dmg-license/bin/dmg-license.js && echo "✓ dmg-license bootstrapped"

      - name: Build & publish (${{ matrix.name }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Desactiva auto-firma de macOS (no hay cert configurado).
          # Si más adelante agregas firma, define APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/CSC_LINK
          # como secrets y elimina esta línea.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.publish }}" = "true" ]; then
            npm run ${{ matrix.build_cmd }} -- --publish always
          else
            npm run ${{ matrix.build_cmd }} -- --publish never
          fi
        shell: bash

      - name: Upload build artifacts
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          retention-days: 7
          if-no-files-found: ignore
