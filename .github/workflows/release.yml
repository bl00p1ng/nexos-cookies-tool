name: Release

on:
  # Dispara automáticamente al pushear un tag tipo v1.4.2
  push:
    tags:
      - 'v*.*.*'

  # Permite disparar manualmente desde la pestaña Actions
  # (útil para probar el pipeline sin crear release)
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publicar a GitHub Releases'
        required: false
        type: boolean
        default: false

# Necesario para que electron-builder pueda crear/actualizar GitHub Releases
# vía la API usando el GITHUB_TOKEN automático.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Anclado a macos-13 (Intel/x64) en lugar de macos-latest (arm64)
          # porque dmg-license declara "cpu": ["x64"] y npm lo omite en arm64,
          # rompiendo el build del .dmg. Cross-compila tanto x64 como arm64
          # del .dmg sin problema desde un runner Intel.
          - os: macos-13
            name: macOS
            build_cmd: build-mac
          - os: windows-latest
            name: Windows
            build_cmd: build-win

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (${{ matrix.name }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Desactiva auto-firma de macOS (no hay cert configurado).
          # Si más adelante agregas firma, define APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/CSC_LINK
          # como secrets y elimina esta línea.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.publish }}" = "true" ]; then
            npm run ${{ matrix.build_cmd }} -- --publish always
          else
            npm run ${{ matrix.build_cmd }} -- --publish never
          fi
        shell: bash

      - name: Upload build artifacts
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          retention-days: 7
          if-no-files-found: ignore
